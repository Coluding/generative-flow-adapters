name: diffusion_hidden_full_skip_controlnet

model:
  type: diffusion
  provider: dynamicrafter
  prediction_type: velocity
  pretrained_model_name_or_path: external_repos/avid/latent_diffusion/dynamicrafter_512/model.ckpt
  freeze: true
  pass_cond_to_base: true
  extra:
    unet_config_path: external_repos/avid/latent_diffusion/configs/train/dynamicrafter_512.yaml
    strict_checkpoint: false

adapter:
  type: hidden_state
  composition: replace
  extra:
    architecture: full_skip_controlnet
    connector_type: zeroconv
    output_kind: prediction
    output_mask: false

conditioning:
  type: identity

training:
  loss: diffusion
  learning_rate: 1.0e-4
